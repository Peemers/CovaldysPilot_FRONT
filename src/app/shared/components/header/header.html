<mat-toolbar color="primary">

  <!-- Bouton hamburger (visible quand connecté) -->
  @if (isLoggedIn()) {
    <button mat-icon-button (click)="sidenav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
  }

  <!-- Logo -->
  <div class="logo" routerLink="/">
    <img src="/logo2.jpg" alt="Logo Covaldys" class="logo-img" width="2048" height="2048">
    <div class="logo-text">
      <strong>Covaldys</strong>
      <small>COnservation de la VAlée D'Yves</small>
    </div>
  </div>

  <!-- Navigation visiteur — centrée -->
  @if (!isLoggedIn()) {
    <nav>
      <a mat-button routerLink="/">Home</a>
      <a mat-button routerLink="/articles">Articles</a>
      <a mat-button routerLink="/evenements">Évènements à venir</a>
      <a mat-button routerLink="/contact">Contact</a>
    </nav>
  }

  <span class="spacer"></span>

  <!-- Icônes réseaux sociaux — à droite -->
  <div class="social-icons">
    <a href="https://www.facebook.com/covaldys" target="_blank">
      <mat-icon>facebook</mat-icon>
    </a>
  </div>

</mat-toolbar>
