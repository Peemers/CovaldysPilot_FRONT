<div class="management-container">

  <div class="management-header">
    <h1>
      <mat-icon>article</mat-icon>
      Gestion des articles
    </h1>
    <a mat-raised-button routerLink="/admin/article/create">
      <mat-icon>add</mat-icon>
      Créer un article
    </a>
  </div>

  @if (isLoading()) {
    <div class="loading-container">
      <mat-spinner diameter="60"></mat-spinner>
    </div>
  }

  @if (!isLoading()) {
    <div class="table-container">
      <table mat-table [dataSource]="articles()" class="articles-table">

        <!-- Titre -->
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>Titre</th>
          <td mat-cell *matCellDef="let article">
            <strong>{{ article.title }}</strong>
          </td>
        </ng-container>

        <!-- Auteur -->
        <ng-container matColumnDef="author">
          <th mat-header-cell *matHeaderCellDef>Auteur</th>
          <td mat-cell *matCellDef="let article">{{ article.author }}</td>
        </ng-container>

        <!-- Date publication -->
        <ng-container matColumnDef="publicationDate">
          <th mat-header-cell *matHeaderCellDef>Publié le</th>
          <td mat-cell *matCellDef="let article">
            {{ article.publicationDate | date:'dd/MM/yyyy' }}
          </td>
        </ng-container>

        <!-- Vues -->
        <ng-container matColumnDef="viewCount">
          <th mat-header-cell *matHeaderCellDef>Vues</th>
          <td mat-cell *matCellDef="let article">
            <div style="display: flex; align-items: center; gap: 4px;">
              <mat-icon style="font-size: 1rem; width: 1rem; height: 1rem;">visibility</mat-icon>
              {{ article.viewCount }}
            </div>
          </td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let article">
            <div class="action-buttons">
              <a mat-icon-button
                 [routerLink]="['/articles', article.id]"
                 matTooltip="Voir l'article">
                <mat-icon>visibility</mat-icon>
              </a>
              <a mat-icon-button
                 [routerLink]="['/admin/article', article.id, 'edit']"
                 matTooltip="Modifier">
                <mat-icon>edit</mat-icon>
              </a>
              <button mat-icon-button color="warn"
                      (click)="delete(article.id)"
                      matTooltip="Supprimer">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let _; columns: displayedColumns;"></tr>

      </table>
    </div>
  }

</div>
